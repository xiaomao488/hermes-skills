name: Greet New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Thanks for opening your first issue! We appreciate your contribution to Hermes Skills.
            
            Please make sure you've provided all the necessary information in the issue template. 
            A maintainer will review your issue soon.
            
            In the meantime, feel free to:
            - ⭐ Star the project if you find it useful
            - 📖 Check out our [documentation](https://github.com/xiaomao488/hermes-skills#readme)
            - 💬 Join the [discussions](https://github.com/xiaomao488/hermes-skills/discussions)
            
            Welcome to the community! 🎉
          pr-message: |
            🎉 Thanks for opening your first pull request! We're excited to review your contribution.
            
            Please make sure:
            - ✅ Your code follows our [contributing guidelines](https://github.com/xiaomao488/hermes-skills/blob/main/CONTRIBUTING.md)
            - ✅ All tests pass (if applicable)
            - ✅ Documentation is updated (if needed)
            - ✅ Commit messages are clear and descriptive
            
            A maintainer will review your PR as soon as possible. Thank you for contributing to Hermes Skills! 🚀
